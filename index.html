<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교육과정 평가회 Feel Score</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6fa;
      color: #222;
    }
    header {
      background: linear-gradient(135deg, #273c75, #40739e);
      color: white;
      padding: 28px 18px;
      text-align: center;
    }
    header h1 { margin: 0 0 8px; font-size: 28px; }
    header p { margin: 0; opacity: 0.9; }
    main {
      max-width: 960px;
      margin: 24px auto;
      padding: 0 16px 40px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tabs button {
      flex: 1;
      padding: 14px;
      border: 0;
      border-radius: 12px;
      background: #dcdde1;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .tabs button.active {
      background: #273c75;
      color: white;
    }
    .card {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }
    .hidden { display: none; }
    h2 { margin: 0 0 16px; }
    label {
      display: block;
      font-weight: 700;
      margin: 14px 0 6px;
    }
    input, textarea, select {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #dcdde1;
      border-radius: 10px;
      font-size: 16px;
      background: white;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    button.primary, button.secondary, button.danger {
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 12px;
      margin-top: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    button.primary { background: #273c75; color: white; }
    button.secondary { background: #44bd32; color: white; }
    button.danger { background: #c23616; color: white; }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .score-box {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .score-box input[type="range"] { flex: 1; }
    .score-number {
      width: 96px;
      text-align: center;
      font-weight: 800;
    }
    .notice {
      padding: 12px 14px;
      border-radius: 12px;
      margin: 12px 0;
      background: #f1f2f6;
      line-height: 1.5;
    }
    .success { background: #eaf8e6; color: #207a16; }
    .error { background: #fdecea; color: #a11a0a; }
    .muted { color: #666; font-size: 14px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 14px 0;
    }
    .stat {
      background: #f1f2f6;
      border-radius: 14px;
      padding: 14px;
      text-align: center;
    }
    .stat strong {
      display: block;
      font-size: 24px;
      margin-top: 4px;
      color: #273c75;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid #eee;
      padding: 10px 8px;
      vertical-align: top;
      text-align: left;
    }
    th {
      background: #f5f6fa;
      font-weight: 800;
    }
    .opinion-cell {
      max-width: 420px;
      white-space: pre-wrap;
      word-break: keep-all;
    }
    .pill {
      display: inline-block;
      padding: 4px 9px;
      border-radius: 999px;
      background: #dff9fb;
      font-size: 13px;
      font-weight: 700;
    }
    .copy-line {
      display: flex;
      gap: 8px;
    }
    .copy-line input { flex: 1; }
    .copy-line button {
      width: 110px;
      border: 0;
      border-radius: 10px;
      background: #718093;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }
    @media (max-width: 680px) {
      .row, .stats { grid-template-columns: 1fr; }
      header h1 { font-size: 23px; }
      .card { padding: 18px; }
      table { font-size: 13px; }
      th:nth-child(1), td:nth-child(1) { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>교육과정 평가회 Feel Score</h1>
    <p>학생 의견과 점수를 회차별로 실시간 수집합니다.</p>
  </header>

  <main>
    <div class="tabs">
      <button id="studentTab" class="active" onclick="showPage('student')">학생용</button>
      <button id="teacherTab" onclick="showPage('teacher')">교사용</button>
    </div>

    <section id="studentPage" class="card">
      <h2>학생용 입력</h2>
      <div class="notice">
        현재 회차에 대한 나의 느낌 점수와 의견을 입력하세요.
      </div>

      <label for="studentSession">회차 코드</label>
      <input id="studentSession" placeholder="예: S260618-1" />

      <label for="nickname">닉네임</label>
      <input id="nickname" maxlength="20" placeholder="예: 6학년 김OO, 별명 등" />

      <label for="scoreRange">점수 <span class="pill"><span id="scoreText">50</span>점</span></label>
      <div class="score-box">
        <input id="scoreRange" type="range" min="0" max="100" value="50" />
        <input id="scoreNumber" class="score-number" type="number" min="0" max="100" value="50" />
      </div>

      <label for="opinion">의견</label>
      <textarea id="opinion" maxlength="500" placeholder="좋았던 점, 아쉬웠던 점, 바라는 점을 자유롭게 적으세요."></textarea>

      <button class="primary" id="submitBtn" onclick="submitResponse()">제출하기</button>
      <div id="studentMessage"></div>
    </section>

    <section id="teacherPage" class="card hidden">
      <h2>교사용 관리</h2>

      <div id="loginBox">
        <label for="adminPassword">관리자 비밀번호</label>
        <input id="adminPassword" type="password" placeholder="비밀번호 입력" />
        <button class="primary" onclick="loginTeacher()">관리자 입장</button>
        <div class="notice muted">
          현재 버전은 GitHub Pages용 클라이언트 앱입니다. 비밀번호는 화면 잠금 용도이며 완전한 보안 기능은 아닙니다.
        </div>
      </div>

      <div id="adminBox" class="hidden">
        <div class="row">
          <div>
            <label for="sessionTitle">새 회차 제목</label>
            <input id="sessionTitle" placeholder="예: 1학기 교육과정 평가회" />
          </div>
          <div>
            <label for="sessionIdInput">현재 회차 코드</label>
            <input id="sessionIdInput" placeholder="회차를 만들거나 직접 입력" />
          </div>
        </div>

        <button class="secondary" onclick="createSession()">새 회차 만들고 활성화</button>
        <button class="primary" onclick="loadSession()">이 회차 결과 보기</button>

        <label>학생 접속용 링크</label>
        <div class="copy-line">
          <input id="studentLink" readonly />
          <button onclick="copyStudentLink()">복사</button>
        </div>

        <div class="stats">
          <div class="stat">응답 수<strong id="countStat">0</strong></div>
          <div class="stat">평균<strong id="avgStat">-</strong></div>
          <div class="stat">최고<strong id="maxStat">-</strong></div>
          <div class="stat">최저<strong id="minStat">-</strong></div>
        </div>

        <div class="row">
          <button class="secondary" onclick="downloadCSV()">CSV 다운로드</button>
          <button class="danger" onclick="clearResponses()">현재 회차 응답 삭제</button>
        </div>

        <div id="teacherMessage"></div>

        <table>
          <thead>
            <tr>
              <th>시간</th>
              <th>닉네임</th>
              <th>점수</th>
              <th>의견</th>
            </tr>
          </thead>
          <tbody id="resultBody">
            <tr><td colspan="4">아직 불러온 결과가 없습니다.</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      push,
      onValue,
      get,
      remove,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // 1. Firebase 콘솔에서 복사한 설정값으로 아래 내용을 바꾸세요.
    // 2. databaseURL은 Realtime Database 주소를 꼭 넣어야 합니다.
const firebaseConfig = {
  apiKey: "AIzaSyCgfrteyldCIvs36ZPdQZ_ULqBCVNazxcc",
  authDomain: "feel-score.firebaseapp.com",
  databaseURL: "https://feel-score-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "feel-score",
  storageBucket: "feel-score.firebasestorage.app",
  messagingSenderId: "116602893330",
  appId: "1:116602893330:web:6ea3c8d854ef715152d4cb"
};


    const ADMIN_PASSWORD = "6185";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentRows = [];
    let unsubscribeResults = null;

    const $ = (id) => document.getElementById(id);

    window.showPage = function(page) {
      $("studentPage").classList.toggle("hidden", page !== "student");
      $("teacherPage").classList.toggle("hidden", page !== "teacher");
      $("studentTab").classList.toggle("active", page === "student");
      $("teacherTab").classList.toggle("active", page === "teacher");
    };

    function cleanText(text, maxLength) {
      return String(text || "").trim().slice(0, maxLength);
    }

    function makeSessionId() {
      const now = new Date();
      const yy = String(now.getFullYear()).slice(2);
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      const hh = String(now.getHours()).padStart(2, "0");
      const mi = String(now.getMinutes()).padStart(2, "0");
      const rand = Math.floor(Math.random() * 90 + 10);
      return `S${yy}${mm}${dd}-${hh}${mi}-${rand}`;
    }

    function formatTime(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return date.toLocaleString("ko-KR", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function showMessage(targetId, message, type = "success") {
      $(targetId).innerHTML = `<div class="notice ${type}">${message}</div>`;
      setTimeout(() => {
        $(targetId).innerHTML = "";
      }, 3500);
    }

    function updateScore(value) {
      const score = Math.max(0, Math.min(100, Number(value) || 0));
      $("scoreRange").value = score;
      $("scoreNumber").value = score;
      $("scoreText").textContent = score;
    }

    $("scoreRange").addEventListener("input", (e) => updateScore(e.target.value));
    $("scoreNumber").addEventListener("input", (e) => updateScore(e.target.value));

    window.submitResponse = async function() {
      const sessionId = cleanText($("studentSession").value, 40);
      const nickname = cleanText($("nickname").value, 20);
      const opinion = cleanText($("opinion").value, 500);
      const score = Number($("scoreNumber").value);

      if (!sessionId) {
        showMessage("studentMessage", "회차 코드가 필요합니다.", "error");
        return;
      }
      if (!nickname) {
        showMessage("studentMessage", "닉네임을 입력하세요.", "error");
        return;
      }
      if (Number.isNaN(score) || score < 0 || score > 100) {
        showMessage("studentMessage", "점수는 0~100 사이로 입력하세요.", "error");
        return;
      }
      if (!opinion) {
        showMessage("studentMessage", "의견을 입력하세요.", "error");
        return;
      }

      $("submitBtn").disabled = true;

      try {
        const sessionSnap = await get(ref(db, `sessions/${sessionId}/meta`));
        if (!sessionSnap.exists()) {
          showMessage("studentMessage", "존재하지 않는 회차 코드입니다. 선생님께 확인하세요.", "error");
          $("submitBtn").disabled = false;
          return;
        }

        const responseRef = push(ref(db, `sessions/${sessionId}/responses`));
        await set(responseRef, {
          nickname,
          score,
          opinion,
          createdAt: Date.now()
        });

        localStorage.setItem("lastNickname", nickname);
        localStorage.setItem("lastSessionId", sessionId);
        $("opinion").value = "";
        updateScore(50);
        showMessage("studentMessage", "제출되었습니다. 소중한 의견 감사합니다.");
      } catch (error) {
        console.error(error);
        showMessage("studentMessage", "제출 중 오류가 발생했습니다. Firebase 설정과 Database 규칙을 확인하세요.", "error");
      }

      $("submitBtn").disabled = false;
    };

    window.loginTeacher = function() {
      const password = $("adminPassword").value;
      if (password === ADMIN_PASSWORD) {
        $("loginBox").classList.add("hidden");
        $("adminBox").classList.remove("hidden");
        showMessage("teacherMessage", "관리자 화면에 입장했습니다.");
      } else {
        showMessage("teacherMessage", "비밀번호가 맞지 않습니다.", "error");
      }
    };

    window.createSession = async function() {
      const title = cleanText($("sessionTitle").value, 60) || "교육과정 평가회";
      const sessionId = makeSessionId();

      try {
        await set(ref(db, `sessions/${sessionId}/meta`), {
          title,
          createdAt: Date.now(),
          isOpen: true
        });
        await set(ref(db, "appState/activeSession"), sessionId);
        $("sessionIdInput").value = sessionId;
        $("studentSession").value = sessionId;
        localStorage.setItem("lastSessionId", sessionId);
        loadSession();
        showMessage("teacherMessage", `새 회차가 생성되었습니다. 회차 코드: ${sessionId}`);
      } catch (error) {
        console.error(error);
        showMessage("teacherMessage", "회차 생성 중 오류가 발생했습니다.", "error");
      }
    };

    window.loadSession = function() {
      const sessionId = cleanText($("sessionIdInput").value, 40);
      if (!sessionId) {
        showMessage("teacherMessage", "조회할 회차 코드를 입력하세요.", "error");
        return;
      }

      localStorage.setItem("lastSessionId", sessionId);
      $("studentSession").value = sessionId;
      updateStudentLink(sessionId);

      if (unsubscribeResults) {
        unsubscribeResults();
        unsubscribeResults = null;
      }

      const responsesRef = ref(db, `sessions/${sessionId}/responses`);
      unsubscribeResults = onValue(responsesRef, (snapshot) => {
        const data = snapshot.val() || {};
        currentRows = Object.entries(data).map(([id, item]) => ({
          id,
          nickname: item.nickname || "",
          score: Number(item.score),
          opinion: item.opinion || "",
          createdAt: item.createdAt || 0
        })).sort((a, b) => b.createdAt - a.createdAt);

        renderResults();
      }, (error) => {
        console.error(error);
        showMessage("teacherMessage", "결과를 불러오지 못했습니다. Firebase 규칙을 확인하세요.", "error");
      });
    };

    function renderResults() {
      if (currentRows.length === 0) {
        $("resultBody").innerHTML = `<tr><td colspan="4">아직 응답이 없습니다.</td></tr>`;
        $("countStat").textContent = "0";
        $("avgStat").textContent = "-";
        $("maxStat").textContent = "-";
        $("minStat").textContent = "-";
        return;
      }

      const scores = currentRows.map(row => row.score).filter(score => !Number.isNaN(score));
      const count = scores.length;
      const avg = count ? (scores.reduce((a, b) => a + b, 0) / count).toFixed(1) : "-";
      const max = count ? Math.max(...scores) : "-";
      const min = count ? Math.min(...scores) : "-";

      $("countStat").textContent = String(currentRows.length);
      $("avgStat").textContent = String(avg);
      $("maxStat").textContent = String(max);
      $("minStat").textContent = String(min);

      $("resultBody").innerHTML = currentRows.map(row => `
        <tr>
          <td>${formatTime(row.createdAt)}</td>
          <td>${escapeHTML(row.nickname)}</td>
          <td><strong>${row.score}</strong></td>
          <td class="opinion-cell">${escapeHTML(row.opinion)}</td>
        </tr>
      `).join("");
    }

    function escapeHTML(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function updateStudentLink(sessionId) {
      const url = new URL(location.href);
      url.searchParams.set("session", sessionId);
      $("studentLink").value = url.toString();
    }

    window.copyStudentLink = async function() {
      const link = $("studentLink").value;
      if (!link) return;
      try {
        await navigator.clipboard.writeText(link);
        showMessage("teacherMessage", "학생 접속용 링크를 복사했습니다.");
      } catch {
        $("studentLink").select();
        document.execCommand("copy");
        showMessage("teacherMessage", "학생 접속용 링크를 복사했습니다.");
      }
    };

    window.downloadCSV = function() {
      if (currentRows.length === 0) {
        showMessage("teacherMessage", "다운로드할 응답이 없습니다.", "error");
        return;
      }

      const header = ["시간", "닉네임", "점수", "의견"];
      const lines = currentRows.map(row => [
        formatTime(row.createdAt),
        row.nickname,
        row.score,
        row.opinion
      ]);

      const csv = [header, ...lines]
        .map(row => row.map(cell => `"${String(cell).replaceAll('"', '""')}"`).join(","))
        .join("\n");

      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
      const a = document.createElement("a");
      const sessionId = cleanText($("sessionIdInput").value, 40) || "session";
      a.href = URL.createObjectURL(blob);
      a.download = `feel-score-${sessionId}.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
    };

    window.clearResponses = async function() {
      const sessionId = cleanText($("sessionIdInput").value, 40);
      if (!sessionId) {
        showMessage("teacherMessage", "삭제할 회차 코드를 입력하세요.", "error");
        return;
      }

      const ok = confirm(`현재 회차(${sessionId})의 응답을 모두 삭제할까요?`);
      if (!ok) return;

      try {
        await remove(ref(db, `sessions/${sessionId}/responses`));
        showMessage("teacherMessage", "현재 회차 응답을 삭제했습니다.");
      } catch (error) {
        console.error(error);
        showMessage("teacherMessage", "삭제 중 오류가 발생했습니다.", "error");
      }
    };

    async function loadActiveSession() {
      const urlSession = new URLSearchParams(location.search).get("session");
      const savedSession = localStorage.getItem("lastSessionId");
      const savedNickname = localStorage.getItem("lastNickname");

      if (savedNickname) $("nickname").value = savedNickname;

      if (urlSession) {
        $("studentSession").value = urlSession;
        $("sessionIdInput").value = urlSession;
        updateStudentLink(urlSession);
        return;
      }

      if (savedSession) {
        $("studentSession").value = savedSession;
        $("sessionIdInput").value = savedSession;
        updateStudentLink(savedSession);
      }

      try {
        onValue(ref(db, "appState/activeSession"), (snapshot) => {
          const active = snapshot.val();
          if (active && !$("studentSession").value) {
            $("studentSession").value = active;
          }
          if (active && !$("sessionIdInput").value) {
            $("sessionIdInput").value = active;
            updateStudentLink(active);
          }
        });
      } catch (error) {
        console.error(error);
      }
    }

    loadActiveSession();
  </script>
</body>
</html>
